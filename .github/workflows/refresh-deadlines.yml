name: Refresh Deadline Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild deadline snapshot
        run: node website/refresh_deadlines.js

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- website/db/conference_deadlines.json; then
            echo "No deadline snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/db/conference_deadlines.json
          git commit -m "Update deadline snapshot"
          git push
